task-defaults:
    worker-type: b-osx
    worker:
        artifacts:
          - type: directory
            path: artifacts
            name: public

mac-x64/opt:
    description: "Mac (opt)"

mac-x64/opt-static:
    description: "Mac Static (opt)"
    attributes:
        static: true

mac-x64/debug:
    description: "Mac (debug)"

mac-x64/opt-make:
    description: "Mac (opt, make)"
    attributes:
        make: true
    worker:
        env:
            USE_64: "1"

mac-x64/debug-make:
    description: "Mac (debug, make)"
    attributes:
        make: true
    worker:
        env:
            USE_64: "1"
